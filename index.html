<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#ffffff">
  <title>金属研究 | 铜与锌数据</title>
  <style>
    :root {
      --canvas: #ffffff;
      --surface: #f4f4f4;
      --surface-hover: #e8e8e8;
      --ink: #161616;
      --muted: #525252;
      --subtle: #8d8d8d;
      --line: #e0e0e0;
      --line-strong: #161616;
      --blue: #0f62fe;
      --blue-hover: #0050e6;
      --success: #24a148;
      --copper: #a84f2a;
      --zinc: #607787;
      --content: min(1280px, calc(100% - 64px));
    }

    * { box-sizing: border-box; }

    html {
      min-width: 320px;
      background: var(--canvas);
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background: var(--canvas);
      font-family: "IBM Plex Sans", "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    .site-header {
      height: 48px;
      border-bottom: 1px solid var(--line);
      background: var(--canvas);
    }

    .header-inner {
      width: var(--content);
      height: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: 600;
      line-height: 1;
    }

    .brand-mark {
      width: 16px;
      height: 16px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      background: var(--blue);
    }

    .status {
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--success);
      border-radius: 50%;
    }

    main { min-height: calc(100vh - 136px); }

    .hero {
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .hero-inner {
      width: var(--content);
      min-height: 212px;
      margin: 0 auto;
      padding: 32px 0;
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      align-items: end;
      gap: 16px;
    }

    .hero-copy { grid-column: 1 / span 7; }

    .eyebrow {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.3;
    }

    h1 {
      max-width: 720px;
      margin: 0;
      font-size: 52px;
      font-weight: 300;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .metrics {
      grid-column: 9 / -1;
      margin: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-self: stretch;
      border-left: 1px solid var(--line);
    }

    .metric {
      min-width: 0;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      border-right: 1px solid var(--line);
    }

    .metric dt {
      order: 2;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .metric dd {
      margin: 0;
      font-size: 24px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0;
    }

    .catalog {
      width: var(--content);
      margin: 0 auto;
      padding: 32px 0 64px;
    }

    .catalog-head {
      min-height: 48px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid var(--line-strong);
    }

    .catalog-head h2,
    .catalog-head p {
      margin: 0;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.3;
    }

    .catalog-head p { color: var(--muted); }

    .markets {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .market {
      min-width: 0;
      color: inherit;
      background: var(--canvas);
      border: 1px solid var(--line);
      border-top: 0;
      text-decoration: none;
      transition: background-color 160ms ease, border-color 160ms ease;
    }

    .market + .market { border-left: 0; }

    .market:hover {
      z-index: 1;
      background: var(--surface);
      border-color: var(--line-strong);
    }

    .market:focus-visible {
      position: relative;
      z-index: 2;
      outline: 3px solid var(--blue);
      outline-offset: -3px;
    }

    .market-top {
      min-height: 52px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      line-height: 1;
    }

    .market-id {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
    }

    .swatch {
      width: 8px;
      height: 8px;
      flex: 0 0 auto;
    }

    .copper .swatch { background: var(--copper); }
    .zinc .swatch { background: var(--zinc); }

    .chart-count { color: var(--subtle); }

    .cover {
      aspect-ratio: 16 / 9;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      transition: background-color 160ms ease;
    }

    .cover span {
      font-size: 128px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: 0;
      transition: transform 160ms ease;
    }

    .copper .cover span { color: var(--copper); }
    .zinc .cover span { color: var(--zinc); }

    .market:hover .cover { background: var(--surface-hover); }
    .market:hover .cover span { transform: translateX(4px); }

    .market-body {
      min-height: 116px;
      padding: 20px 16px 20px 24px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 48px;
      align-items: center;
      gap: 24px;
    }

    .market-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    .market-title h3 {
      margin: 0;
      font-size: 24px;
      font-weight: 400;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .market-title span {
      color: var(--subtle);
      font-size: 13px;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .arrow {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--blue);
      font-size: 24px;
      line-height: 1;
      transition: background-color 160ms ease, transform 160ms ease;
    }

    .market:hover .arrow {
      background: var(--blue-hover);
      transform: translateX(2px);
    }

    footer {
      min-height: 88px;
      color: #c6c6c6;
      background: var(--ink);
    }

    .footer-inner {
      width: var(--content);
      min-height: 88px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      font-size: 12px;
    }

    .footer-inner strong {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
    }

    @media (max-width: 800px) {
      :root { --content: min(100% - 32px, 672px); }

      .hero-inner {
        min-height: 188px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        align-items: end;
      }

      .hero-copy { grid-column: 1 / -1; }
      .eyebrow { margin-bottom: 12px; }
      h1 { font-size: 40px; }

      .metrics {
        grid-column: 1 / -1;
        min-height: 68px;
        border-top: 1px solid var(--line);
      }

      .metric { padding: 12px; }
      .metric dd { font-size: 20px; }

      .catalog { padding: 24px 0 48px; }
      .markets { grid-template-columns: 1fr; }
      .market + .market { border-left: 1px solid var(--line); }
      .market-body { min-height: 104px; }
    }

    @media (max-width: 480px) {
      :root { --content: calc(100% - 24px); }

      .status { font-size: 11px; }
      .hero-inner { padding: 24px 0 20px; }
      h1 { font-size: 36px; }
      .metric { padding: 10px 8px; }
      .metric dt { font-size: 11px; }
      .metric dd { font-size: 19px; }
      .catalog-head { min-height: 44px; }
      .market-top { min-height: 48px; padding: 0 12px; }
      .market-body { padding: 16px 12px 16px 16px; gap: 12px; }
      .market-title { display: block; }
      .market-title h3 { font-size: 21px; }
      .market-title span { display: block; margin-top: 3px; }
      .meta { font-size: 11px; white-space: nowrap; }
      .cover span { font-size: 88px; }
      .footer-inner { min-height: 80px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .market,
      .cover,
      .cover span,
      .arrow { transition: none; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>YZ Research</span>
      </div>
      <div class="status">
        <span class="status-dot" aria-hidden="true"></span>
        <span>每日 18:00 更新</span>
      </div>
    </div>
  </header>

  <main>
    <section class="hero" aria-labelledby="page-title">
      <div class="hero-inner">
        <div class="hero-copy">
          <p class="eyebrow">Base metals research</p>
          <h1 id="page-title">铜与锌数据研究</h1>
        </div>

        <dl class="metrics" aria-label="数据概览">
          <div class="metric">
            <dt>研究品种</dt>
            <dd>02</dd>
          </div>
          <div class="metric">
            <dt>图表组</dt>
            <dd>121</dd>
          </div>
          <div class="metric">
            <dt>日更时间</dt>
            <dd>18:00</dd>
          </div>
        </dl>
      </div>
    </section>

    <section class="catalog" aria-labelledby="catalog-title">
      <div class="catalog-head">
        <h2 id="catalog-title">数据入口</h2>
        <p>Copper / Zinc</p>
      </div>

      <nav class="markets" id="markets" aria-label="金属数据面板">
        <a class="market copper" href="https://yzkkk-study.github.io/Copper/" aria-label="打开铜数据面板">
          <div class="market-top">
            <span class="market-id"><span class="swatch" aria-hidden="true"></span>01 / CU</span>
            <span class="chart-count">70 图表组</span>
          </div>
          <div class="cover" aria-hidden="true"><span>CU</span></div>
          <div class="market-body">
            <div>
              <div class="market-title">
                <h3>铜数据面板</h3>
                <span>Copper</span>
              </div>
              <p class="meta">供应 · 下游 · 库存 · 价差 · 持仓 · 进出口</p>
            </div>
            <span class="arrow" aria-hidden="true">→</span>
          </div>
        </a>

        <a class="market zinc" href="https://yzkkk-study.github.io/Zinc/" aria-label="打开锌数据面板">
          <div class="market-top">
            <span class="market-id"><span class="swatch" aria-hidden="true"></span>02 / ZN</span>
            <span class="chart-count">51 图表组</span>
          </div>
          <div class="cover" aria-hidden="true"><span>ZN</span></div>
          <div class="market-body">
            <div>
              <div class="market-title">
                <h3>锌数据面板</h3>
                <span>Zinc</span>
              </div>
              <p class="meta">供应 · 下游 · 库存 · 价差 · 持仓 · 进出口</p>
            </div>
            <span class="arrow" aria-hidden="true">→</span>
          </div>
        </a>
      </nav>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <strong>YZ Research</strong>
      <span>Copper · Zinc</span>
    </div>
  </footer>
</body>
</html>
